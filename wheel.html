<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <title>Prisma Laboratory — فعالية يوم الصحة العالمي</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none; user-select: none;
    }
    html, body, #root {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Tajawal', sans-serif; background: #040810;
    }
    body { overscroll-behavior: none; touch-action: none; }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
    @keyframes modal-in {
      0% { transform: scale(0.7); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes ring-pulse {
      0% { box-shadow: 0 0 0 0 rgba(0,199,183,0.4); }
      70% { box-shadow: 0 0 0 20px rgba(0,199,183,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,199,183,0); }
    }
    @keyframes glow-text {
      0%, 100% { text-shadow: 0 0 20px rgba(0,199,183,0.4), 0 0 40px rgba(0,199,183,0.15); }
      50% { text-shadow: 0 0 30px rgba(0,199,183,0.7), 0 0 60px rgba(0,199,183,0.3); }
    }
    @keyframes pointer-bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(5px); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>

    /* ============================================================ */

    function getWeightedRandomIndex(prizes) {
      const total = prizes.reduce((s, p) => s + (p.weight || 1), 0);
      let r = Math.random() * total;
      for (let i = 0; i < prizes.length; i++) {
        r -= (prizes[i].weight || 1);
        if (r <= 0) return i;
      }
      return prizes.length - 1;
    }

    function getSegmentUnderPointer(rotation, numSegments) {
      const seg = (2 * Math.PI) / numSegments;
      let pointerLocal = (-Math.PI / 2 - rotation) % (Math.PI * 2);
      if (pointerLocal < 0) pointerLocal += Math.PI * 2;
      return Math.floor(pointerLocal / seg) % numSegments;
    }

    function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }

    /* ---- Audio ---- */
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

    function playTick(vol = 0.1) {
      try { if (!audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination); o.type = 'sine';
        o.frequency.setValueAtTime(1600, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.04);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        o.start(); o.stop(audioCtx.currentTime + 0.05);
      } catch(e) {}
    }

    function playWinSound() {
      try { if (!audioCtx) return;
        [523,659,784,1047].forEach((f,i) => {
          const o = audioCtx.createOscillator(), g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination); o.type = 'sine';
          o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
          g.gain.setValueAtTime(0.12, audioCtx.currentTime + i*0.1);
          g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.1 + 0.3);
          o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.3);
        });
      } catch(e) {}
    }

    /* ---- Confetti ---- */
    function Confetti({ active }) {
      const ref = useRef(null), anim = useRef(null);
      useEffect(() => {
        if (!active) { if (anim.current) cancelAnimationFrame(anim.current); return; }
        const c = ref.current; if (!c) return;
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const cols = ['#00C7B7','#FFD700','#FFFFFF','#00E5D0','#FF6B9D','#7B61FF'];
        const ps = [];
        for (let i = 0; i < 180; i++) ps.push({
          x: Math.random()*c.width, y: -Math.random()*c.height*0.4 - 20,
          w: Math.random()*12+4, h: Math.random()*6+2,
          color: cols[Math.floor(Math.random()*cols.length)],
          rot: Math.random()*360, rs: (Math.random()-0.5)*14,
          vx: (Math.random()-0.5)*5, vy: Math.random()*4+2,
          op: 1, dec: Math.random()*0.003+0.001,
        });
        function go() {
          ctx.clearRect(0,0,c.width,c.height); let alive=false;
          for (const p of ps) { if (p.op<=0) continue; alive=true;
            ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
            ctx.globalAlpha=p.op; ctx.fillStyle=p.color;
            ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
            p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.rot+=p.rs; p.op-=p.dec;
          }
          if (alive) anim.current=requestAnimationFrame(go);
        }
        go();
        return () => { if (anim.current) cancelAnimationFrame(anim.current); };
      }, [active]);
      if (!active) return null;
      return <canvas ref={ref} style={{position:'fixed',inset:0,zIndex:100,pointerEvents:'none'}} />;
    }

          ctx.beginPath(); ctx.arc(cx, cy, hubR - 2, 0, Math.PI*2); ctx.clip();
          ctx.font=`900 ${Math.round(hubR*0.38)}px 'Tajawal', sans-serif`;
          ctx.fillStyle='#00C7B7'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('PRISMA', cx, cy+1);
          ctx.restore();
        }

      }, [prizes, colors, textColors, N, seg]);

      // Resize — uses an interval to detect when refs become available after registration
      useEffect(() => {
        let resizeHandler = null;
        let pollTimer = null;

        const setup = () => {
          const canvas = canvasRef.current, cont = contRef.current;
          if (!canvas || !cont) return false;

          const resize = () => {
            const c = canvasRef.current, ct = contRef.current;
            if (!c || !ct) return;
            const rect = ct.parentElement.getBoundingClientRect();
            const vw = rect.width || window.innerWidth;
            const vh = rect.height || window.innerHeight;
            const s = Math.floor(Math.min(vw * 0.78, vh * 0.60, 420));
            if (s <= 0) return;
            ct.style.width = s + 'px';
            ct.style.height = s + 'px';
            cssRef.current = s;
            const dpr = window.devicePixelRatio || 1;
            c.width = Math.round(s * dpr); c.height = Math.round(s * dpr);
            c.style.width = s+'px'; c.style.height = s+'px';
            draw(rotRef.current, winSegRef.current);
          };

          resize();
          resizeHandler = resize;
          window.addEventListener('resize', resize);
          return true;
        };

        // Try immediately
        if (!setup()) {
          // Poll every 50ms until refs are available (after registration transition)
          pollTimer = setInterval(() => {
            if (setup()) clearInterval(pollTimer);
          }, 50);
        }

        return () => {
          if (pollTimer) clearInterval(pollTimer);
          if (resizeHandler) window.removeEventListener('resize', resizeHandler);
        };
      }, [draw]);

      useEffect(() => { draw(rotRef.current, winSegRef.current); }, [draw]);

      const getA = useCallback((x,y) => {
        const c = canvasRef.current; if (!c) return 0;
        const r = c.getBoundingClientRect();
        return Math.atan2(y-(r.top+r.height/2), x-(r.left+r.width/2));
      }, []);

      const wigglePointer = useCallback(() => {
        const el = pointerRef.current; if (!el) return;
        el.style.transition='transform 0.06s ease-out';
        el.style.transform='translateX(-50%) rotate(8deg)';
        setTimeout(()=>{el.style.transform='translateX(-50%) rotate(-5deg)';
          setTimeout(()=>{el.style.transform='translateX(-50%) rotate(0deg)'; el.style.transition='';},50);
        },60);
      }, []);

      const spinTo = useCallback((targetIdx) => {
        if (spinning) return;
        setSpinning(true);
        winSegRef.current = -1; prevSegRef.current = -1;

        const targetCenter = targetIdx * seg + seg / 2;
        const landAngle = -Math.PI / 2 - targetCenter;
        const spins = SPIN_CONFIG.minSpins + Math.random()*(SPIN_CONFIG.maxSpins-SPIN_CONFIG.minSpins);
        const fullSpinRot = spins * Math.PI * 2;
        let finalRot = landAngle;
        while (finalRot < rotRef.current) finalRot += Math.PI * 2;
        finalRot += fullSpinRot;

        const totalRot = finalRot - rotRef.current;
        const startRot = rotRef.current;
        const t0 = performance.now();

        const go = (now) => {
          const t = Math.min((now-t0)/SPIN_CONFIG.spinDuration, 1);
          rotRef.current = startRot + totalRot * easeOutQuint(t);

          const curSeg = getSegmentUnderPointer(rotRef.current, N);
          if (curSeg !== prevSegRef.current && prevSegRef.current !== -1) {
            const speed = Math.abs(totalRot * (1 - easeOutQuint(t)));
            playTick(Math.min(0.18, 0.04 + speed * 0.008));
            wigglePointer();
            if (navigator.vibrate) navigator.vibrate(8);
          }
          prevSegRef.current = curSeg;
          draw(rotRef.current);

          if (t < 1) { animRef.current = requestAnimationFrame(go); }
          else {
            rotRef.current = finalRot;
            const actual = getSegmentUnderPointer(rotRef.current, N);
            winSegRef.current = actual;
            draw(rotRef.current, actual);
            setSpinning(false);
            onSpinEnd(actual);
          }
        };
        animRef.current = requestAnimationFrame(go);
      }, [spinning, setSpinning, seg, N, draw, onSpinEnd, wigglePointer]);

      const handleSpin = useCallback(() => {
        if (spinning) return;
        initAudio();
        spinTo(getWeightedRandomIndex(prizes));
      }, [spinning, prizes, spinTo]);

      // Touch/Mouse
      const onDown = useCallback((e)=>{
        if (spinning) return; initAudio();
        const p=e.touches?e.touches[0]:e;
        const a=getA(p.clientX,p.clientY);
        touchRef.current={angle:a,time:performance.now(),lastAngle:a,lastTime:performance.now()};
        lastARef.current=a; dragRef.current=true; velRef.current=0;
      },[spinning,getA]);

      const onMove = useCallback((e)=>{
        if (!dragRef.current||spinning) return; e.preventDefault();
        const p=e.touches?e.touches[0]:e;
        const cur=getA(p.clientX,p.clientY);
        let d=cur-lastARef.current;
        if(d>Math.PI)d-=Math.PI*2; if(d<-Math.PI)d+=Math.PI*2;
        rotRef.current+=d*SPIN_CONFIG.dragSensitivity;
        draw(rotRef.current);
        const now=performance.now();
        const dt=now-(touchRef.current?.lastTime||now);
        if(dt>0)velRef.current=d/dt*1000;
        touchRef.current.lastAngle=cur; touchRef.current.lastTime=now; lastARef.current=cur;
        const curSeg=getSegmentUnderPointer(rotRef.current,N);
        if(curSeg!==prevSegRef.current&&prevSegRef.current!==-1){playTick(0.06);wigglePointer();}
        prevSegRef.current=curSeg;
      },[spinning,getA,draw,N,wigglePointer]);

      const onUp = useCallback(()=>{
        if(!dragRef.current||spinning)return; dragRef.current=false;
        const sp=Math.abs(velRef.current);
        if(sp>SPIN_CONFIG.minDragSpeed) spinTo(getWeightedRandomIndex(prizes));
      },[spinning,prizes,spinTo]);

      useEffect(()=>{
        const c=canvasRef.current; if(!c) return;
        c.addEventListener('touchstart',onDown,{passive:false});
        c.addEventListener('touchmove',onMove,{passive:false});
        c.addEventListener('touchend',onUp,{passive:false});
        c.addEventListener('mousedown',onDown);
        window.addEventListener('mousemove',onMove);
        window.addEventListener('mouseup',onUp);
        return()=>{
          c.removeEventListener('touchstart',onDown); c.removeEventListener('touchmove',onMove);
          c.removeEventListener('touchend',onUp); c.removeEventListener('mousedown',onDown);
          window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp);
        };
      },[onDown,onMove,onUp]);

      return { canvasRef, contRef, pointerRef, handleSpin };
    }

    const usedPhonesKey = 'prisma_wheel_phones';
    function getUsedPhones() {
      try { return JSON.parse(localStorage.getItem(usedPhonesKey) || '[]'); } catch(e) { return []; }
    }
    function addUsedPhone(phone) {
      const list = getUsedPhones();
      list.push(phone);
      localStorage.setItem(usedPhonesKey, JSON.stringify(list));
    }
    function isPhoneUsed(phone) {
      return getUsedPhones().includes(phone);
    }

          <h1 style={{

              width:'100%', padding:'14px 18px', borderRadius:12, border:'2px solid rgba(0,199,183,0.3)',

              color:'#ff6b6b', fontSize:14, fontWeight:700, textAlign:'center',
            }}>{error}</div>}

            <button onClick={handleSubmit} style={{
              width:'100%', padding:'16px 24px', borderRadius:16, border:'none', cursor:'pointer',
              background:'linear-gradient(135deg,#00C7B7,#009E91)', color:'#fff',
              fontSize:18, fontWeight:900, fontFamily:"'Tajawal', sans-serif",

            }}

    function App() {
      const [registered, setRegistered] = useState(false);
      const [playerName, setPlayerName] = useState('');
      const [playerPhone, setPlayerPhone] = useState('');
      const [spinning, setSpinning] = useState(false);
      const [result, setResult] = useState(null);
      const [showModal, setShowModal] = useState(false);
      const [confetti, setConfetti] = useState(false);
      const winMsgRef = useRef('');

      const onSpinEnd = useCallback((idx) => {
        const prize = PRIZES[idx];
        const isRetry = prize.label === 'حظ أوفر\nفي المرة القادمة';
        if (!isRetry) {
          playWinSound();
          setConfetti(true);
          setTimeout(() => setConfetti(false), 4000);
        }
        winMsgRef.current = WIN_MESSAGES[Math.floor(Math.random()*WIN_MESSAGES.length)];
        const prizeText = prize.label.replace(/\n/g, ' ');
        setResult({ label: prizeText, isRetry });
        setShowModal(true);

        // إرسال البيانات إلى Google Sheet
        sendToGoogleSheet({
          name: playerName,
          phone: playerPhone,
          prize: prizeText,
          timestamp: new Date().toLocaleString('ar-SA', { timeZone: 'Asia/Riyadh' }),
        });
      }, [playerName, playerPhone]);

      const { canvasRef, contRef, pointerRef, handleSpin } = useSpinWheel({
        prizes: PRIZES,
        colors: COLOR_PALETTE,
        textColors: TEXT_COLORS,
        onSpinEnd,
        spinning,
        setSpinning,
      });

      const closeModal = () => {
        setShowModal(false);
        setResult(null);
      };

      if (!registered) {
        return <RegisterScreen onRegister={({name, phone}) => { setPlayerName(name); setPlayerPhone(phone); setRegistered(true); }} />;
      }

      return (
        <div style={{
          width:'100%', height:'100%', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', position:'relative',
          background:'radial-gradient(ellipse at 50% 30%, #0a1e3d 0%, #060e1a 50%, #040810 100%)',
          overflow:'hidden',
        }}>
          {/* Slogan top-left */}
          <div style={{
            position:'absolute', top:16, left:16, zIndex:10,
            fontSize:15, fontWeight:800, color:'#00C7B7',
            fontFamily:"'Tajawal', sans-serif",
            textShadow:'0 0 15px rgba(0,199,183,0.4)',
            letterSpacing:1, opacity:0.9,
          }}>#حلل_بثقة</div>

          {/* Background particles */}
          <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
            {[...Array(30)].map((_,i) => (
              <div key={i} style={{
                position:'absolute',
                width: Math.random()*3+1+'px', height: Math.random()*3+1+'px',
                borderRadius:'50%',
                background: i%3===0 ? 'rgba(0,199,183,0.3)' : 'rgba(255,255,255,0.15)',
                left: Math.random()*100+'%', top: Math.random()*100+'%',
                animation: `pulse-glow ${2+Math.random()*4}s ease-in-out infinite`,
                animationDelay: Math.random()*3+'s',
              }} />
            ))}
          </div>

          {/* Header */}
          <div style={{

          {/* Footer */}
          <div style={{
            position:'absolute', bottom:12, textAlign:'center', color:'rgba(255,255,255,0.25)',
            fontSize:10, fontWeight:400, zIndex:2,
          }}>
            {BRAND.nameAr} &copy; {new Date().getFullYear()}
          </div>

          {/* Confetti */}
          <Confetti active={confetti} />

          {/* Result Modal */}
          {showModal && result && (
            <div style={{
              position:'fixed', inset:0, background:'rgba(4,8,16,0.85)',
              display:'flex', alignItems:'center', justifyContent:'center', zIndex:200,
              backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)',
            }} onClick={closeModal}>
              <div onClick={(e)=>e.stopPropagation()} style={{
                background:'linear-gradient(160deg,#0d1f3c,#091526)',
                borderRadius:24, padding:'36px 32px', textAlign:'center',
                maxWidth:340, width:'85%', position:'relative',
                border:'1px solid rgba(0,199,183,0.25)',
                boxShadow:'0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,199,183,0.1)',
                animation:'modal-in 0.5s ease-out',
              }}>
                <div style={{ fontSize:56, marginBottom:12 }}>
                  {result.isRetry ? '🔄' : '🎉'}
                </div>
                <div style={{
                  fontSize:16, color:'rgba(255,255,255,0.7)', fontWeight:500, marginBottom:8,
                }}>
                  {result.isRetry ? 'حظك المرة الجاية!' : winMsgRef.current}
                </div>
                <div style={{
                  fontSize:24, fontWeight:900, color:'#00E5D0',
                  marginBottom:24, lineHeight:1.3,
                  textShadow:'0 0 20px rgba(0,199,183,0.4)',
                }}>
                  {result.label}
                </div>
                <button onClick={closeModal} style={{
                  padding:'12px 40px', borderRadius:50, border:'none',
                  background: result.isRetry ? 'linear-gradient(135deg,#00C7B7,#009E91)' : 'rgba(0,199,183,0.15)',
                  color: result.isRetry ? '#FFFFFF' : '#00C7B7', fontSize:16, fontWeight:700,
                  fontFamily:'Tajawal, sans-serif', cursor:'pointer',
                  transition:'all 0.3s ease',
                }}>
                  {result.isRetry ? 'ابدأ من جديد' : 'تمام'}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
